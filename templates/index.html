<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo Application Control</title>
    <style>
        /* --- Base --- */
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --color-bg:        #f0f2f5;
            --color-panel:     #ffffff;
            --color-border:    #dee2e6;
            --color-text:      #212529;
            --color-muted:     #6c757d;
            --color-header:    #343a40;

            --color-green:     #28a745;
            --color-yellow:    #ffc107;
            --color-red:       #dc3545;
            --color-blue:      #007bff;
            --color-orange:    #fd7e14;

            --radius:          6px;
            --shadow:          0 4px 12px rgba(0,0,0,0.10);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--color-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            margin: 0;
            color: var(--color-text);
        }

        /* --- Panel --- */
        .control-panel {
            background: var(--color-panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 460px;
            overflow: hidden;
        }

        .panel-header {
            background-color: var(--color-header);
            color: white;
            padding: 16px 24px;
            text-align: center;
        }
        .panel-header h1 {
            margin: 0;
            font-size: 1.3em;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .panel-body {
            padding: 0 20px 20px;
        }

        /* --- Section --- */
        .section {
            margin-top: 20px;
        }
        .section-title {
            font-size: 0.70em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            color: var(--color-muted);
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 6px;
            margin-bottom: 12px;
        }

        /* --- Status Box --- */
        .status-box {
            padding: 12px;
            border-radius: var(--radius);
            font-size: 1.25em;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.05em;
            border: 2px solid transparent;
            transition: background-color 0.4s ease, color 0.4s ease;
            background-color: var(--color-muted);
            color: white;
        }
        .READY        { background-color: var(--color-green);  color: white; }
        .BUSY         { background-color: var(--color-yellow); color: #333; }
        .INITIALIZING { background-color: var(--color-blue);   color: white; }
        .FAULTED      { background-color: var(--color-red);    color: white; }
        .OFF          { background-color: var(--color-muted);  color: white; }

        /* --- Message Log --- */
        .message-log {
            margin-top: 10px;
            min-height: 32px;
            padding: 6px 10px;
            border-radius: var(--radius);
            background-color: #f8f9fa;
            border: 1px solid var(--color-border);
            font-size: 0.85em;
            color: var(--color-muted);
            text-align: center;
        }

        /* --- Buttons --- */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .btn-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 10px 6px;
            font-size: 0.85em;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            border: none;
            border-radius: var(--radius);
            color: white;
            transition: filter 0.15s ease, transform 0.1s ease;
        }
        button:hover  { filter: brightness(1.12); }
        button:active { transform: scale(0.97); }

        .btn-task     { background-color: var(--color-muted); }
        .btn-stop     { background-color: var(--color-red); }
        .btn-init     { background-color: var(--color-blue); }
        .btn-clear    { background-color: var(--color-orange); }
        .btn-shutdown { background-color: var(--color-header); }

        /* --- Device Cards --- */
        .device-card {
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
        }
        .device-card-header {
            background-color: var(--color-header);
            color: white;
            padding: 7px 12px;
            font-weight: 600;
            font-size: 0.90em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .device-card-body {
            padding: 8px 12px;
        }
        .device-card-body table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }
        .device-card-body td {
            padding: 4px 4px;
            vertical-align: top;
        }
        .device-card-body tr:not(:last-child) td {
            border-bottom: 1px solid #f0f0f0;
        }
        .device-card-body tr td:first-child {
            width: 45%;
            font-weight: 600;
            color: var(--color-muted);
        }
        .device-card-body a {
            color: var(--color-blue);
            text-decoration: none;
        }
        .device-card-body a:hover { text-decoration: underline; }

        /* --- Badges --- */
        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 20px;
            font-size: 0.72em;
            font-weight: 700;
            margin-left: 4px;
            letter-spacing: 0.03em;
        }
        .badge-ok    { background-color: var(--color-green);  color: white; }
        .badge-warn  { background-color: var(--color-yellow); color: #333; }
        .badge-error { background-color: var(--color-red);    color: white; }
        .badge-off   { background-color: var(--color-muted);  color: white; }
    </style>
</head>
<body>
    <div class="control-panel">

        <div class="panel-header">
            <h1>Demo Application Controller</h1>
        </div>

        <div class="panel-body">

            <div class="section">
                <div class="section-title">System Status</div>
                <div id="robot-state" class="status-box">Loading...</div>
                <div id="message-log" class="message-log">—</div>
            </div>

            <div class="section">
                <div class="section-title">Tasks</div>
                <div class="btn-grid">
                    <button class="btn-task" onclick="sendTask('prod')">PROD</button>
                    <button class="btn-stop"  onclick="sendStop()">STOP</button>
                    <button class="btn-task" onclick="sendTask('home')">HOME</button>
                    <button class="btn-task" onclick="sendTask('shipment')">SHIPMENT</button>
                    <button class="btn-task" onclick="sendTask('calibration')">CALIBRATION</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">System Control</div>
                <div class="btn-grid-3">
                    <button class="btn-init"     onclick="sendInitialize()">INITIALIZE</button>
                    <button class="btn-clear"    onclick="sendClearFaults()">CLEAR FAULTS</button>
                    <button class="btn-shutdown" onclick="sendShutdown()">SHUTDOWN</button>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Devices</div>
                <div id="robot-info-container">Loading device info...</div>
            </div>

        </div>
    </div>

    <script>
        const stateDisplay = document.getElementById('robot-state');
        const messageLog   = document.getElementById('message-log');

        function updateRobotStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    stateDisplay.textContent = data.status;
                    stateDisplay.className = 'status-box ' + data.status.toUpperCase();
                })
                .catch(() => {
                    stateDisplay.textContent = 'COMMUNICATION ERROR';
                    stateDisplay.className = 'status-box FAULTED';
                });
        }

        function setMessage(text) {
            messageLog.textContent = text || '—';
        }

        function sendTask(task) {
            fetch(`/api/task/${task}`, { method: 'POST' })
                .then(r => r.json()).then(d => setMessage(d.message))
                .catch(() => setMessage('Error sending task command.'));
        }

        function sendStop() {
            fetch('/api/stop', { method: 'POST' })
                .then(r => r.json()).then(d => setMessage(d.message))
                .catch(() => setMessage('Error sending stop command.'));
        }

        function sendInitialize() {
            fetch('/api/initialize', { method: 'POST' })
                .then(r => r.json()).then(d => setMessage(d.message))
                .catch(() => setMessage('Error sending initialization command.'));
        }

        function sendClearFaults() {
            fetch('/api/clear_faults', { method: 'POST' })
                .then(r => r.json()).then(d => setMessage(d.message))
                .catch(() => setMessage('Error sending clear faults command.'));
        }

        function sendShutdown() {
            fetch('/api/shutdown', { method: 'POST' })
                .then(r => r.json()).then(d => setMessage(d.message))
                .catch(() => setMessage('Error sending shutdown command.'));
        }

        function loadRobotInfo() {
            fetch('/api/info')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('robot-info-container');
                    container.innerHTML = '';

                    if (!Array.isArray(data) || data.length === 0) {
                        container.innerHTML = '<p style="color:var(--color-muted);font-size:0.85em">No devices configured.</p>';
                        return;
                    }

                    const statusKeys = new Set(['connected', 'ready', 'faulted', 'device_id']);

                    data.forEach(device => {
                        const card = document.createElement('div');
                        card.className = 'device-card';

                        // Header
                        const header = document.createElement('div');
                        header.className = 'device-card-header';

                        const title = document.createElement('span');
                        title.textContent = device.device_id || 'Unknown Device';
                        header.appendChild(title);

                        const badges = document.createElement('span');
                        if ('faulted' in device) {
                            const b = document.createElement('span');
                            b.className = 'badge ' + (device.faulted ? 'badge-error' : 'badge-ok');
                            b.textContent = device.faulted ? 'FAULTED' : 'OK';
                            badges.appendChild(b);
                        }
                        if ('connected' in device) {
                            const b = document.createElement('span');
                            b.className = 'badge ' + (device.connected ? 'badge-ok' : 'badge-off');
                            b.textContent = device.connected ? 'Connected' : 'Disconnected';
                            badges.appendChild(b);
                        }
                        if ('ready' in device) {
                            const b = document.createElement('span');
                            b.className = 'badge ' + (device.ready ? 'badge-ok' : 'badge-warn');
                            b.textContent = device.ready ? 'Ready' : 'Not Ready';
                            badges.appendChild(b);
                        }
                        header.appendChild(badges);
                        card.appendChild(header);

                        // Body
                        const body = document.createElement('div');
                        body.className = 'device-card-body';
                        const table = document.createElement('table');

                        for (const key in device) {
                            if (statusKeys.has(key)) continue;
                            const row = table.insertRow();
                            const label = row.insertCell(0);
                            const value = row.insertCell(1);
                            label.textContent = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                            const raw = device[key];
                            if (key === 'ip_address' && raw) {
                                const link = document.createElement('a');
                                link.href = `http://${raw}`;
                                link.target = '_blank';
                                link.rel = 'noopener noreferrer';
                                link.textContent = raw;
                                value.appendChild(link);
                            } else {
                                value.textContent = (raw !== null && raw !== undefined) ? raw : '—';
                            }
                        }
                        body.appendChild(table);
                        card.appendChild(body);
                        container.appendChild(card);
                    });
                })
                .catch(() => {
                    document.getElementById('robot-info-container').innerHTML =
                        '<p style="color:var(--color-red);font-size:0.85em">Error loading device info.</p>';
                });
        }

        setInterval(updateRobotStatus, 500);
        setInterval(loadRobotInfo, 5000);
        updateRobotStatus();
        loadRobotInfo();
    </script>
</body>
</html>
