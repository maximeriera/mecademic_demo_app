<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo Robot Control</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 10px; background-color: #f4f4f9; }
        .control-panel { background: #fff; padding: 5px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h1 { color: #333; }
        .status-box { margin: 20px 0; padding: 10px 20px; border-radius: 4px; font-size: 1.2em; font-weight: bold; border: 1px solid #ccc; }
        #robot-state { transition: background-color 0.5s ease; }
        button { padding: 10px 20px; margin: 8px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; color: white; transition: background-color 0.3s; width: 150px; }
        #btn-home { background-color: #6c757d; }
        #btn-shipment { background-color: #6c757d; }
        #btn-prod { background-color: #6c757d; }
        #btn-stop { background-color: #6c757d; }
        #btn-init { background-color: #343a40; } /* Use a secondary/grey color */
        #btn-clear { background-color: #fd7e14; } /* Orange for fault clearing */
        #btn-shutdown { background-color: #343a40; } /* Darker, system-level color */        
        
        /* State Colors */
        .READY { background-color: #28a745; color: white; }
        .BUSY { background-color: #ffc107; color: #333; }
        .INITIALIZING { background-color: #007bff; color: white; }
        .FAULTED { background-color: #dc3545; color: white; }

        /* templates/index.html (inside the <style> block) */
        .info-box { 
            text-align: left; 
            width: 90%; 
            margin: 15px auto; 
            padding: 10px;
            border: 1px dashed #ccc;
            border-radius: 4px;
            font-size: 0.9em;
        }
        #robot-info-table { 
            width: 100%; 
            border-collapse: collapse;
        }
        #robot-info-table td {
            padding: 5px;
        }
        #robot-info-table tr td:first-child {
            width: 40%;
        }

    </style>
</head>
<body>
    <div class="control-panel">
        <h1>Demo Robot Controller</h1>

        <hr>

        <h2>Demo Status</h2>
        <div id="robot-state" class="status-box">Loading...</div>

        <p id="message-log">Loading...</p>

        <hr> <h2>Tasks</h2>
        <button id="btn-prod" onclick="sendTask('prod')">PROD</button>
        <button id="btn-stop" onclick="sendStop()">STOP</button>
        <button id="btn-home" onclick="sendTask('home')">HOME</button>
        <button id="btn-shipment" onclick="sendTask('shipment')">SHIPMENT</button>


        <hr> <h2>System Control</h2>
        <button id="btn-init" onclick="sendInitialize()">INITIALIZE</button>
        <button id="btn-clear" onclick="sendClearFaults()">CLEAR FAULTS</button>
        <button id="btn-shutdown" onclick="sendShutdown()">SHUTDOWN</button> <p id="message-log"></p>

        <hr> <h2>Robot Information</h2>
        <div id="robot-info-container" class="info-box">
            Loading robot configurations...
        
            <div class="info-box">
                <table id="robot-info-table">
                    <tr><td>Model</td><td id="info-model">Loading...</td></tr>
                    <tr><td>IP Address</td><td id="info-ip">Loading...</td></tr>
                </table>
            </div>
        </div>
        
    </div>

    <script>
        const stateDisplay = document.getElementById('robot-state');
        const messageLog = document.getElementById('message-log');

        /**
         * 1. Status Polling: Periodically fetches the robot's current status.
         */
        function updateRobotStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const status = data.status;
                    stateDisplay.textContent = status;

                    // CRITICAL FIX: Ensure the base class is kept AND the state is uppercase
                    // If the Python state comes as "Ready", convert it to "READY"
                    const stateClass = status.toUpperCase();

                    // Apply dynamic class for color coding
                    stateDisplay.className = 'status-box ' + stateClass;
                    loadRobotInfo(); 
                })
                .catch(error => {
                    stateDisplay.textContent = "COMMUNICATION ERROR";
                    stateDisplay.className = 'status-box FAULTED'; 
                    console.error('Error fetching status:', error);
                });
        }

        /**
         * 2. Control Functions: Sends commands to the backend.
         */
        function sendTask(task) {
            fetch(`/api/task/${task}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                messageLog.textContent = data.message;
            })
            .catch(error => {
                messageLog.textContent = "Error sending task command.";
                console.error('Error:', error);
            });
        }

        function sendStop() {
            fetch('/api/stop', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                messageLog.textContent = data.message;
            })
            .catch(error => {
                messageLog.textContent = "Error sending stop command.";
                console.error('Error:', error);
            });
        }

        function sendInitialize() {
            fetch('/api/initialize', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                messageLog.textContent = data.message;
            })
            .catch(error => {
                messageLog.textContent = "Error sending initialization command.";
                console.error('Error:', error);
            });
        }

        function sendClearFaults() {
            fetch('/api/clear_faults', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                messageLog.textContent = data.message;
            })
            .catch(error => {
                messageLog.textContent = "Error sending clear faults command.";
                console.error('Error:', error);
            });
        }

        function sendShutdown() {
            fetch('/api/shutdown', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                messageLog.textContent = data.message;
            })
            .catch(error => {
                messageLog.textContent = "Error sending shutdown command.";
                console.error('Error:', error);
            });
        }

/**
         * Function to fetch static robot information on page load.
         */
        function loadRobotInfo() {
            fetch('/api/info')
                .then(response => response.json())
                .then(data => {
                    const infoContainer = document.getElementById('robot-info-container');
                    infoContainer.innerHTML = ''; // Clear existing content

                    if (data.length === 0) {
                        infoContainer.innerHTML = '<p>No robot devices configured.</p>';
                        return;
                    }
                    
                    data.forEach((robot_info, index) => {
                        const robotTitle = document.createElement('h3');
                        robotTitle.textContent = `Device ${index + 1}: ${robot_info.model || 'Mecademic Robot'}`;
                        infoContainer.appendChild(robotTitle);

                        const table = document.createElement('table');
                        table.className = 'robot-info-table'; 
                        
                        for (const key in robot_info) {
                            const row = table.insertRow();
                            const cell1 = row.insertCell(0);
                            const cell2 = row.insertCell(1);
                            
                            // Simple formatting for key names
                            const formattedKey = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                            
                            cell1.innerHTML = `<strong>${formattedKey}</strong>`;
                            cell2.textContent = robot_info[key];
                        }
                        infoContainer.appendChild(table);
                    });

                })
                .catch(error => {
                    messageLog.textContent = "Error loading robot information.";
                    console.error('Error fetching robot info:', error);
                });
        }
        
        // Ensure you call loadRobotInfo() on script execution
        loadRobotInfo();

                
        // Poll the status every 200 milliseconds (5 times per second)
        setInterval(updateRobotStatus, 200); 
        updateRobotStatus(); // Initial call
        loadRobotInfo();

    </script>
</body>
</html>
